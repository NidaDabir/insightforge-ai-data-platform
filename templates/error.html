{% extends "base.html" %}
{% block title %}Error – InsightForge{% endblock %}
{% block page_title %}Something went wrong{% endblock %}

{% block content %}
<div style="max-width:500px;margin:60px auto;text-align:center">
  <div style="font-size:56px;margin-bottom:16px">⚠️</div>
  <h2 style="font-family:var(--font-display);font-size:22px;margin-bottom:12px">Error</h2>
  <div style="background:rgba(240,86,122,.1);border:1px solid rgba(240,86,122,.25);
              border-radius:11px;padding:16px;font-family:var(--mono);
              font-size:13px;color:var(--rose);margin-bottom:24px;text-align:left;word-break:break-all">
    {{ message }}
  </div>
  <a href="/dashboard" class="btn btn-primary"><i class="fa fa-arrow-left"></i> Back to Dashboard</a>
</div>
{% endblock %}
